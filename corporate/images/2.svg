<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1448 1086"><style>.j{font-family:'Noto Sans JP','Yu Gothic',Meiryo,sans-serif}.n{fill:#06275f}.o{fill:#f06a00}.h{font-weight:900}.b{font-weight:800}.card{fill:#fff;stroke:#c7d4e3;stroke-width:2}.cap{font-size:21px}.ttl{font-size:28px}</style><rect width="1448" height="1086" fill="#fff"/><path d="M1270 0h178v180z" class="n"/><path d="M1210 0h60l178 180v60z" fill="#e8eef6"/><text x="50" y="92" class="j n h" font-size="66">よくある業務課題</text><path d="M52 125h92" stroke="#f06a00" stroke-width="7" stroke-linecap="round"/><text x="52" y="168" class="j n b" font-size="24">エイデックマネジメント｜企業向け業務改善・DX支援</text><g class="j"><g><rect x="48" y="220" width="420" height="290" rx="22" class="card"/><circle cx="98" cy="270" r="28" class="n"/><text x="98" y="280" fill="#fff" class="b" font-size="25" text-anchor="middle">1</text><text x="145" y="280" class="n h ttl">二重入力</text><line x1="145" y1="305" x2="415" y2="305" stroke="#f06a00"/><text x="120" y="400" class="n" font-size="72">▤</text><text x="225" y="400" class="o" font-size="54">→</text><text x="315" y="400" class="n" font-size="72">▤</text><text x="258" y="472" class="n b cap" text-anchor="middle">同じ内容を何度も転記している</text></g><g><rect x="514" y="220" width="420" height="290" rx="22" class="card"/><circle cx="564" cy="270" r="28" class="n"/><text x="564" y="280" fill="#fff" class="b" font-size="25" text-anchor="middle">2</text><text x="611" y="280" class="n h ttl">集計の属人化</text><line x1="611" y1="305" x2="881" y2="305" stroke="#f06a00"/><circle cx="650" cy="380" r="38" class="n"/><path d="M600 450q50-70 100 0z" class="n"/><rect x="725" y="342" width="120" height="105" rx="10" fill="#eef4fb" stroke="#06275f" stroke-width="4"/><rect x="755" y="393" width="14" height="36" class="o"/><rect x="783" y="375" width="14" height="54" class="n"/><rect x="811" y="354" width="14" height="75" class="o"/><text x="724" y="472" class="n b cap" text-anchor="middle">特定の担当者しか回せない</text></g><g><rect x="980" y="220" width="420" height="290" rx="22" class="card"/><circle cx="1030" cy="270" r="28" class="n"/><text x="1030" y="280" fill="#fff" class="b" font-size="25" text-anchor="middle">3</text><text x="1077" y="280" class="n h ttl">問い合わせの分散</text><line x1="1077" y1="305" x2="1347" y2="305" stroke="#f06a00"/><text x="1055" y="410" class="n" font-size="70">✉</text><text x="1165" y="420" class="n" font-size="72">☎</text><text x="1285" y="407" class="o" font-size="66">…</text><text x="1190" y="472" class="n b cap" text-anchor="middle">メール・電話・口頭で管理が散らばる</text></g><g><rect x="48" y="540" width="420" height="290" rx="22" class="card"/><circle cx="98" cy="590" r="28" class="n"/><text x="98" y="600" fill="#fff" class="b" font-size="25" text-anchor="middle">4</text><text x="145" y="600" class="n h ttl">情報検索に時間</text><line x1="145" y1="625" x2="415" y2="625" stroke="#f06a00"/><text x="135" y="730" class="n" font-size="78">▰</text><text x="260" y="735" class="o" font-size="76">⌕</text><text x="258" y="792" class="n b cap" text-anchor="middle">必要な資料や履歴がすぐ見つからない</text></g><g><rect x="514" y="540" width="420" height="290" rx="22" class="card"/><circle cx="564" cy="590" r="28" class="n"/><text x="564" y="600" fill="#fff" class="b" font-size="25" text-anchor="middle">5</text><text x="611" y="600" class="n h ttl">ミスの発生</text><line x1="611" y1="625" x2="881" y2="625" stroke="#f06a00"/><text x="630" y="740" class="n" font-size="90">☑</text><text x="770" y="735" class="o" font-size="82">!</text><text x="724" y="792" class="n b cap" text-anchor="middle">入力漏れ・確認漏れが起きやすい</text></g><g><rect x="980" y="540" width="420" height="290" rx="22" class="card"/><circle cx="1030" cy="590" r="28" class="n"/><text x="1030" y="600" fill="#fff" class="b" font-size="25" text-anchor="middle">6</text><text x="1077" y="600" class="n h ttl">ツール未定着</text><line x1="1077" y1="625" x2="1347" y2="625" stroke="#f06a00"/><rect x="1090" y="666" width="200" height="105" rx="10" fill="#eef4fb" stroke="#06275f" stroke-width="7"/><text x="1190" y="742" class="o" font-size="72" text-anchor="middle">⚙</text><text x="1190" y="792" class="n b cap" text-anchor="middle">導入したが現場で使い切れていない</text></g></g><rect x="48" y="900" width="1352" height="110" rx="24" fill="#fff" stroke="#06275f" stroke-width="4"/><circle cx="105" cy="955" r="39" class="n"/><text x="105" y="970" fill="#fff" font-size="45" text-anchor="middle">◎</text><text x="165" y="964" class="j n h" font-size="27">課題は“人が足りない”だけではなく、<tspan class="o">業務の流れが整理されていない</tspan>ことでも起こります。</text><rect x="1235" y="928" width="140" height="55" rx="28" class="n"/><text x="1305" y="965" fill="#fff" class="j b" font-size="24" text-anchor="middle">02 / 10</text></svg>