<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1448 1086"><style>.j{font-family:'Noto Sans JP','Yu Gothic',Meiryo,sans-serif}.n{fill:#06275f}.o{fill:#f06a00}.h{font-weight:900}.b{font-weight:800}</style><rect width="1448" height="1086" fill="#fff"/><polygon points="1270,0 1448,0 1448,180" class="n"/><polygon points="1210,0 1270,0 1448,180 1448,240" fill="#e8eef6"/><text x="50" y="92" class="j n h" font-size="66">改善によって期待できる変化</text><line x1="52" x2="145" y1="125" y2="125" stroke="#f06a00" stroke-width="7"/><text x="52" y="168" class="j n b" font-size="24">エイデックマネジメント｜企業向け業務改善・DX支援</text><g class="j"><rect x="48" y="225" width="650" height="290" rx="22" fill="#fff" stroke="#b9c9dc" stroke-width="2"/><circle cx="100" cy="275" r="28" class="n"/><text x="100" y="286" fill="#fff" class="b" font-size="25" text-anchor="middle">1</text><text x="145" y="285" class="n h" font-size="29">作業時間の削減</text><line x1="145" y1="313" x2="650" y2="313" stroke="#f2bd91"/><circle cx="175" cy="410" r="76" fill="#fff4ea"/><text x="175" y="435" class="o" font-size="82" text-anchor="middle">◷</text><text x="300" y="390" class="n b" font-size="25">手入力・転記・</text><text x="300" y="430" class="n b" font-size="25">確認の時間を減らす</text><rect x="750" y="225" width="650" height="290" rx="22" fill="#fff" stroke="#b9c9dc" stroke-width="2"/><circle cx="802" cy="275" r="28" class="n"/><text x="802" y="286" fill="#fff" class="b" font-size="25" text-anchor="middle">2</text><text x="847" y="285" class="n h" font-size="29">ミスの減少</text><line x1="847" y1="313" x2="1350" y2="313" stroke="#f2bd91"/><circle cx="875" cy="410" r="76" fill="#fff4ea"/><path d="M875 340l58 28v48q0 58-58 82-58-24-58-82v-48z" fill="#fff" stroke="#06275f" stroke-width="7"/><text x="875" y="430" class="o" font-size="60" text-anchor="middle">✓</text><text x="1000" y="390" class="n b" font-size="25">入力漏れ・確認漏れ・</text><text x="1000" y="430" class="n b" font-size="25">転記ミスを抑える</text><rect x="48" y="550" width="650" height="290" rx="22" fill="#fff" stroke="#b9c9dc" stroke-width="2"/><circle cx="100" cy="600" r="28" class="n"/><text x="100" y="611" fill="#fff" class="b" font-size="25" text-anchor="middle">3</text><text x="145" y="610" class="n h" font-size="29">対応スピード向上</text><line x1="145" y1="638" x2="650" y2="638" stroke="#f2bd91"/><circle cx="175" cy="735" r="76" fill="#fff4ea"/><text x="175" y="760" class="o" font-size="78" text-anchor="middle">↗</text><text x="300" y="715" class="n b" font-size="25">問い合わせや社内確認の</text><text x="300" y="755" class="n b" font-size="25">流れが速くなる</text><rect x="750" y="550" width="650" height="290" rx="22" fill="#fff" stroke="#b9c9dc" stroke-width="2"/><circle cx="802" cy="600" r="28" class="n"/><text x="802" y="611" fill="#fff" class="b" font-size="25" text-anchor="middle">4</text><text x="847" y="610" class="n h" font-size="29">見える化・標準化</text><line x1="847" y1="638" x2="1350" y2="638" stroke="#f2bd91"/><circle cx="875" cy="735" r="76" fill="#fff4ea"/><text x="875" y="760" class="o" font-size="78" text-anchor="middle">▥</text><text x="1000" y="715" class="n b" font-size="25">担当者依存を減らし、</text><text x="1000" y="755" class="n b" font-size="25">状況を共有しやすくする</text></g><rect x="485" y="425" width="478" height="210" rx="20" fill="#fff" stroke="#c7d4e3" stroke-width="2"/><rect x="520" y="455" width="150" height="40" rx="20" fill="#777"/><text x="595" y="483" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800" text-anchor="middle">Before</text><rect x="775" y="455" width="150" height="40" rx="20" class="o"/><text x="850" y="483" fill="#fff" font-family="sans-serif" font-size="24" font-weight="800" text-anchor="middle">After</text><text x="595" y="540" class="j n b" font-size="21" text-anchor="middle"><tspan x="595">時間がかかる・</tspan><tspan x="595" dy="30">ミスが起きる・属人化</tspan></text><path d="M690 525h38v-20l38 38-38 38v-20h-38z" class="n"/><text x="850" y="535" class="j n b" font-size="20" text-anchor="middle"><tspan x="850">効率的・正確・共有しやすく</tspan><tspan x="850" dy="30" class="o">本来の仕事に集中できる</tspan></text><rect x="48" y="910" width="1352" height="105" rx="24" fill="#fff" stroke="#06275f" stroke-width="4"/><circle cx="105" cy="963" r="39" class="n"/><text x="105" y="978" fill="#fff" font-size="45" text-anchor="middle">◎</text><text x="165" y="972" class="j n h" font-size="26">業務改善はコスト削減だけでなく、現場が本来の仕事に使える時間を増やすことにつながります。</text><rect x="1235" y="936" width="140" height="55" rx="28" class="n"/><text x="1305" y="973" fill="#fff" class="j b" font-size="24" text-anchor="middle">05 / 10</text></svg>